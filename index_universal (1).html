var TC=["alimentacao","transporte","lazer","pix","compras","outros"];
var CK={
"alimentacao":"comida almoco almo janta jantar lanche ifood marmita restaurante padaria mercado supermercado acai pizza hamburguer sushi cafe alimenta comer".split(" "),
"transporte":"gasolina gas uber 99 corrida estacionamento pedagio onibus metro transporte combustivel posto".split(" "),

function fmt(v){return"R$ "+Math.abs(v).toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g,".")}

function load(k,d){try{var v=localStorage.getItem("g7dash_"+k);return v?JSON.parse(v):d}catch(e){return d}}
function save(k,v){localStorage.setItem("g7dash_"+k,JSON.stringify(v))}

function dCat(text){
var t=text.toLowerCase();
for(var cat in CK){var kws=CK[cat];for(var j=0;j<kws.length;j++){if(t.indexOf(kws[j])>=0)return cat}}
return null;
}
function pExp(text){
var m=text.match(/(\d+(?:[.,]\d{1,2})?)/);if(!m)return null;
var v=parseFloat(m[1].replace(",","."));if(isNaN(v)||v<=0)return null;
var cat=dCat(text);var desc=text.replace(m[0],"").trim()||text;
return{value:v,category:cat,description:desc,timestamp:Date.now()};
}

function AN(p){
var _d=useState(p.value);var d=_d[0];var sd=_d[1];
useEffect(function(){var s=d;var df=p.value-s;if(Math.abs(df)<1){sd(p.value);return}var step=0;var tm=setInterval(function(){step++;sd(s+(df*step)/20);if(step>=20){clearInterval(tm);sd(p.value)}},20);return function(){clearInterval(tm)}},[p.value]);
return ce("span",null,"R$ "+Math.abs(d).toFixed(2).replace(".",","));
}
function MB(p){return ce("div",{style:{width:"100%",height:6,background:"rgba(255,255,255,0.06)",borderRadius:3}},ce("div",{style:{width:Math.min((p.value/p.max)*100,100)+"%",height:"100%",background:p.color,borderRadius:3,transition:"width 0.6s ease"}}))}
function CP(p){

return ce("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:4}},
ce("svg",{width:p.size,height:p.size,style:{transform:"rotate(-90deg)"}},ce("circle",{cx:p.size/2,cy:p.size/2,r:r,fill:"none",stroke:"rgba(255,255,255,0.06)",strokeWidth:p.sw}),ce("circle",{cx:p.size/2,cy:p.size/2,r:r,fill:"none",stroke:p.color,strokeWidth:p.sw,strokeDasharray:c,strokeDashoffset:o,strokeLinecap:"round",style:{transition:"stroke-dashoffset 0.8s ease"}})),
ce("div",{style:{position:"relative",marginTop:-p.size+10,height:p.size-20,display:"flex",alignItems:"center",justifyContent:"center"}},ce("span",{style:{fontSize:p.size*.22,fontWeight:700,color:"#F8F8F2"}},p.pct.toFixed(0)+"%")),
p.label?ce("span",{style:{fontSize:11,color:"#8B8B9E",marginTop:4}},p.label):null);
}

// ===== SETUP WIZARD =====
function Setup(props){

function addIncome(){sIncomes(incomes.concat([{name:"",value:"",day:"15"}]))}

function rmExpense(i){var n=expenses.slice();n.splice(i,1);sExpenses(n)}

}

var canNext=step===0?name.length>0:step===1?incomes.some(function(x){return x.name&&x.value}):step===2?true:true;

return ce("div",{style:{minHeight:"100vh",background:"#0D0D14",padding:"20px 16px",maxWidth:500,margin:"0 auto"}},
ce("div",{style:{textAlign:"center",marginBottom:24}},

ce("div",{style:{fontSize:18,fontWeight:700,marginBottom:8}},"Passo "+(step+1)+" de 4"),
ce("div",{style:{display:"flex",gap:4,justifyContent:"center"}},
[0,1,2,3].map(function(s){return ce("div",{key:s,style:{width:40,height:4,borderRadius:2,background:s<=step?"#4ECDC4":"rgba(255,255,255,0.06)"}})})
)
),

step===0?ce("div",{style:SC},
ce("div",{style:{fontSize:14,fontWeight:600,marginBottom:4}},"Qual seu nome?"),
ce("div",{style:{fontSize:11,color:"#5A5A72",marginBottom:16}},"Vai aparecer no topo da dashboard"),
ce("input",{className:"inp",placeholder:"Seu nome",value:name,onChange:function(ev){sName(ev.target.value)},style:{fontSize:16,padding:"14px 18px"}})
):null,

step===1?ce("div",{style:{display:"flex",flexDirection:"column",gap:12}},
ce("div",{style:SC},
ce("div",{style:{fontSize:14,fontWeight:600,marginBottom:4}},"Suas receitas mensais"),
ce("div",{style:{fontSize:11,color:"#5A5A72",marginBottom:16}},"Salario, pro-labore, freelas fixos..."),
incomes.map(function(inc,i){

ce("div",{style:{display:"flex",gap:8}},

ce("input",{className:"inp",placeholder:"Dia",type:"number",value:inc.day,onChange:function(ev){upIncome(i,"day",ev.target.value)},style:{flex:1}})

);
}),
ce("button",{className:"btn btn-g",onClick:addIncome,style:{fontSize:12,marginTop:4}},"+ Adicionar receita")
)
):null,

step===2?ce("div",{style:{display:"flex",flexDirection:"column",gap:12}},

ce("div",{style:{fontSize:11,color:"#5A5A72",marginBottom:16}},"Aluguel, academia, assinaturas, transporte..."),
expenses.map(function(exp,i){
return ce("div",{key:i,style:{display:"flex",flexDirection:"column",gap:8,marginBottom:12,paddingBottom:12,borderBottom:"1px solid rgba(255,255,255,0.04)"}},
ce("input",{className:"inp",placeholder:"Nome (ex: Aluguel)",value:exp.name,onChange:function(ev){upExpense(i,"name",ev.target.value)}}),
ce("div",{style:{display:"flex",gap:8}},
ce("input",{className:"inp",placeholder:"Valor",type:"number",value:exp.value,onChange:function(ev){upExpense(i,"value",ev.target.value)},style:{flex:2}}),
ce("select",{className:"inp",value:exp.category,onChange:function(ev){upExpense(i,"category",ev.target.value)},style:{flex:1,background:"#0D0D14",color:"#F8F8F2"}},
ce("option",{value:"pessoal"},"Pessoal"),ce("option",{value:"saude"},"Saude"),ce("option",{value:"moradia"},"Moradia"),ce("option",{value:"outros"},"Outros")
)
),
expenses.length>1?ce("button",{className:"btn btn-r",onClick:function(){rmExpense(i)},style:{fontSize:11,padding:"6px 12px",alignSelf:"flex-start"}},"Remover"):null
);
}),
ce("button",{className:"btn btn-g",onClick:addExpense,style:{fontSize:12,marginTop:4}},"+ Adicionar despesa")
),
ce("div",{style:{fontSize:11,color:"#5A5A72",textAlign:"center"}},"Nao tem despesas fixas? Pode pular.")
):null,

step===3?ce("div",{style:{display:"flex",flexDirection:"column",gap:12}},
ce("div",{style:SC},
ce("div",{style:{fontSize:14,fontWeight:600,marginBottom:4}},"Dividas parceladas"),
ce("div",{style:{fontSize:11,color:"#5A5A72",marginBottom:16}},"Cartao, financiamento, emprestimo..."),
debts.map(function(d,i){
return ce("div",{key:i,style:{display:"flex",flexDirection:"column",gap:8,marginBottom:12,paddingBottom:12,borderBottom:"1px solid rgba(255,255,255,0.04)"}},

);

ce("button",{className:"btn btn-g",onClick:addDebt,style:{fontSize:12,marginTop:4}},"+ Adicionar parcela")
),
ce("div",{style:SC},
ce("div",{style:{fontSize:14,fontWeight:600,marginBottom:4}},"Dividas pontuais"),

pontuais.map(function(p,i){

// ===== CHAT =====
function ChatComp(p){
var _i=useState("");var inp=_i[0];var sInp=_i[1];
var _m=useState([{t:"bot",x:"Registra seus gastos! Ex: '50 almoco', '30 uber', 'pix 200'",ts:0}]);var msgs=_m[0];var sMsgs=_m[1];
var _p=useState(null);var pend=_p[0];var sPend=_p[1];
var ref=useRef(null);
useEffect(function(){if(ref.current)ref.current.scrollTop=ref.current.scrollHeight},[msgs]);
function addM(t,x){sMsgs(function(prev){return prev.concat([{t:t,x:x,ts:Date.now()}])})}
function conf(parsed,cat){var exp={value:parsed.value,category:cat,description:parsed.description,id:Date.now(),timestamp:Date.now()};var upd=p.expenses.concat([exp]);p.setExpenses(upd);save("expenses",upd);addM("bot","Registrado: "+fmt(exp.value)+" em "+(CL[cat]||cat)+" ("+exp.description+")")}
function send(){
var txt=inp.trim();if(!txt)return;sInp("");addM("user",txt);
if(pend){var num=parseInt(txt);if(num>=1&&num<=TC.length){conf(pend,TC[num-1]);sPend(null);return}addM("bot","Digita 1-6.");return}
var tl=txt.toLowerCase();
if(tl==="total"||tl==="resumo"){var total=p.expenses.reduce(function(s,x){return s+x.value},0);var bc={};p.expenses.forEach(function(x){bc[x.category]=(bc[x.category]||0)+x.value});var msg="Total: "+fmt(total)+"\n";for(var c in bc){msg+=(CL[c]||c)+": "+fmt(bc[c])+"\n"}addM("bot",msg);return}
if(tl==="limpar"){p.setExpenses([]);save("expenses",[]);addM("bot","Gastos apagados.");return}
if(tl==="ajuda"){addM("bot","Comandos:\n- '50 almoco' = registrar\n- 'total' = resumo\n- 'hoje' = gastos de hoje\n- 'limpar' = apagar tudo\n- 'excluir ultimo'");return}
if(tl==="hoje"){var today=new Date().toDateString();var te=p.expenses.filter(function(x){return new Date(x.timestamp).toDateString()===today});if(!te.length){addM("bot","Nenhum gasto hoje.");return}var t2=te.reduce(function(s,x){return s+x.value},0);var m2="Hoje: "+fmt(t2)+"\n";te.forEach(function(x){m2+=fmt(x.value)+" "+x.description+"\n"});addM("bot",m2);return}
if(tl.indexOf("excluir")>=0){if(!p.expenses.length){addM("bot","Nada pra excluir.");return}var last=p.expenses[p.expenses.length-1];var upd=p.expenses.slice(0,-1);p.setExpenses(upd);save("expenses",upd);addM("bot","Removido: "+fmt(last.value));return}
var parsed=pExp(txt);if(!parsed){addM("bot","Nao entendi. Ex: '50 almoco'");return}
if(parsed.category){conf(parsed,parsed.category)}else{sPend(parsed);addM("bot","Categoria?\n1. Alimentacao\n2. Transporte\n3. Lazer\n4. Pix\n5. Compras\n6. Outros")}
}
var todayT=p.expenses.filter(function(x){return new Date(x.timestamp).toDateString()===new Date().toDateString()}).reduce(function(s,x){return s+x.value},0);
var monthT=p.expenses.reduce(function(s,x){return s+x.value},0);
return ce("div",{style:{display:"flex",flexDirection:"column",gap:12}},
ce("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
ce("div",{style:{background:"linear-gradient(135deg,rgba(255,159,67,0.08),rgba(255,159,67,0.02))",border:"1px solid rgba(255,159,67,0.15)",borderRadius:14,padding:"14px"}},ce("div",{style:{fontSize:10,color:"#8B8B9E",textTransform:"uppercase",marginBottom:6}},"Hoje"),ce("div",{style:{fontSize:18,fontWeight:700,color:"#FF9F43",fontFamily:"'Space Mono',monospace"}},ce(AN,{value:todayT}))),
ce("div",{style:{background:"linear-gradient(135deg,rgba(253,203,110,0.08),rgba(253,203,110,0.02))",border:"1px solid rgba(253,203,110,0.15)",borderRadius:14,padding:"14px"}},ce("div",{style:{fontSize:10,color:"#8B8B9E",textTransform:"uppercase",marginBottom:6}},"Mes"),ce("div",{style:{fontSize:18,fontWeight:700,color:"#FDCB6E",fontFamily:"'Space Mono',monospace"}},ce(AN,{value:monthT})))
),
p.expenses.length>0?ce("div",{style:{background:"#15151F",border:"1px solid rgba(255,255,255,0.04)",borderRadius:14,padding:"16px"}},
ce("div",{style:{fontSize:12,fontWeight:600,marginBottom:12}},"Ultimos Registros"),
ce("div",{style:{maxHeight:120,overflowY:"auto"}},p.expenses.slice().reverse().slice(0,6).map(function(exp,i){return ce("div",{key:exp.id,style:{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.03)"}},ce("span",{style:{fontSize:12,color:"#C8C8D8"}},exp.description),ce("span",{style:{fontSize:12,fontFamily:"'Space Mono',monospace",color:"#FF6B6B"}},"-"+fmt(exp.value)))}))
):null,
ce("div",{style:{background:"#15151F",border:"1px solid rgba(255,255,255,0.04)",borderRadius:14,overflow:"hidden"}},
ce("div",{style:{padding:"12px 16px",borderBottom:"1px solid rgba(255,255,255,0.04)",display:"flex",alignItems:"center",gap:8}},ce("div",{style:{width:8,height:8,borderRadius:"50%",background:"#4ECDC4",animation:"pu 2s infinite"}}),ce("span",{style:{fontSize:12,fontWeight:600}},"Chat de Gastos"),ce("span",{style:{fontSize:10,color:"#5A5A72",marginLeft:"auto"}},"'ajuda'")),
